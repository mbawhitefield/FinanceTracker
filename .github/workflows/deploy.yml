name: Build and Deploy to Azure

on:
  push:
    branches:
    - main # Runs every time you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up .NET 10
    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    # Step 3: Restore NuGet packages
    - name: Restore packages
      run: dotnet restore FinanceTracker.API/FinanceTracker.API.csproj

    # Step 4: Build in Release mode
    - name: Build
      run: dotnet build FinanceTracker.API/FinanceTracker.API.csproj --configuration Release --no-restore

    # Step 5: Run tests
    - name: Test
      run: dotnet test FinanceTracker.Tests/FinanceTracker.Tests.csproj --no-restore --verbosity normal

    # Step 6: Publish the API
    - name: Publish
      run: dotnet publish FinanceTracker.API/FinanceTracker.API.csproj --configuration Release --output ./publish

    # Step 7: Deploy to Azure App Service
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'finance-tracker-api'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
